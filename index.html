<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TEST Hataraku Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="theme-color" content="#C1121F">

  <style>
    :root {
      --primary: #C1121F;
      --dark: #09090B;
      --text: #ffffff;
      --muted: #d4d4d8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(193, 18, 31, 0.28), transparent 34%),
        linear-gradient(180deg, #09090B 0%, #151519 100%);
      color: var(--text);
      text-align: center;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }

    .loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loading-card {
      width: min(100%, 460px);
      padding: 24px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(12px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 7px 12px;
      margin-bottom: 14px;
      background: rgba(193, 18, 31, 0.18);
      color: #fecaca;
      border: 1px solid rgba(193, 18, 31, 0.55);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(23px, 5vw, 32px);
      line-height: 1.12;
      color: #ffffff;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .loader {
      width: 34px;
      height: 34px;
      margin: 0 auto 18px;
      border: 4px solid rgba(255, 255, 255, 0.22);
      border-top-color: var(--primary);
      border-radius: 999px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .fallback-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 46px;
      padding: 12px 14px;
      background: var(--primary);
      color: #ffffff;
      border: 1px solid var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .fallback-link:hover {
      background: #a30f1a;
      border-color: #a30f1a;
    }
@media (max-width: 520px) {
      .loading-card {
        padding: 20px;
      }
}
  </style>
</head>

<body>
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-card">
      <div class="badge">Hataraku Portal</div>
      <div class="loader" aria-hidden="true"></div>

      <h1>Loading HTRK Portal</h1>

      <p>
        For best results, use Google Chrome.
      </p>

      <a
        class="fallback-link"
        href="https://script.google.com/macros/s/AKfycbwDoJZftzYc--HwcTLIG1VuDAUgpV_h1TAZoepaSRF7csDXA5LVY7hy93rvJp62M49coA/exec"
        target="_blank"
        rel="noopener noreferrer">
        Open Direct Link
      </a>
    </div>
  </div>

  <iframe
    id="registrationFrame"
    class="app-frame"
    src="https://script.google.com/macros/s/AKfycbwDoJZftzYc--HwcTLIG1VuDAUgpV_h1TAZoepaSRF7csDXA5LVY7hy93rvJp62M49coA/exec"
    title="Hataraku Portal Member Registration"
    allow="clipboard-read; clipboard-write; fullscreen"
    allowfullscreen>
  </iframe>
<script>
    (function () {
      const frame = document.getElementById("registrationFrame");
      const loadingScreen = document.getElementById("loadingScreen");

      function hideLoading() {
        if (loadingScreen) {
          loadingScreen.classList.add("hidden");
        }
}

      if (frame) {
        frame.addEventListener("load", function () {
          setTimeout(hideLoading, 500);
        });
      }

      setTimeout(function () {
        if (loadingScreen && !loadingScreen.classList.contains("hidden")) {
          hideLoading();
        }
      }, 7000);
    }());
  </script>
</body>
</html>
